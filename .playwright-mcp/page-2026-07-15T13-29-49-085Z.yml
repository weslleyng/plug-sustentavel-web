            - paragraph [ref=e66]: 'Acreditamos que engenharia e arquitetura não são apenas técnicas: são uma escolha. A escolha de construir um futuro em que a Amazônia lidera a transição energética, não apenas a contempla.'
            - paragraph [ref=e67]: 'Somos filhos de Manaus. Conhecemos a força deste território e a responsabilidade que ele carrega. Por isso, não vendemos apenas projetos: entregamos soluções que respeitam a floresta, honram nossos clientes e fortalecem as comunidades ao nosso redor.'
            - paragraph [ref=e68]: Em cada usina fotovoltaica dimensionada, em cada subestação projetada, em cada automação instalada ou análise de viabilidade financeira apresentada, colocamos o nosso nome com transparência absoluta. E nosso nome significa dedicação, compromisso e excelência.
            - generic [ref=e69]:
                - generic [ref=e70]:
                    - heading "Segurança" [level=3] [ref=e71]
                    - paragraph [ref=e72]: Nenhum prazo justifica risco. Projetamos pensando em quem vai operar, manter e viver com o que entregamos.
                - generic [ref=e73]:
                    - heading "Excelência" [level=3] [ref=e74]
                    - paragraph [ref=e75]: Não há atalho técnico que valha a reputação construída projeto a projeto. O rigor é nosso padrão mínimo.
                - generic [ref=e76]:
                    - heading "Transparência" [level=3] [ref=e77]
                    - paragraph [ref=e78]: 'O cliente merece entender o que está comprando. Comunicamos com clareza: números, riscos, datas e expectativas reais.'
                - generic [ref=e79]:
                    - heading "Inovação" [level=3] [ref=e80]
                    - paragraph [ref=e81]: Aprendemos com cada projeto. Usamos tecnologia e dados para entregar mais valor, sempre com propósito, nunca por modismo.
            - paragraph [ref=e82]: 'Trabalhamos com distribuidoras de energia, empresas corporativas e empreendedores que já perceberam: sustentabilidade não é custo, é vantagem competitiva. Ajudamos a transformar essa convicção em energia real e retorno financeiro mensurável.'
            - paragraph [ref=e83]: 'Não prometemos o impossível. Prometemos presença: do dimensionamento à entrega, da engenharia à arquitetura, do relatório técnico à conversa franca sobre o que funciona e o que precisa melhorar.'
            - paragraph [ref=e84]: '"Plug não é só um nome. É o ponto de conexão entre o que existe e o que deve existir, entre a energia que temos e o futuro que queremos construir."'
